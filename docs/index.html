<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sammy's Talks — slides.3mi.tw</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#ca8a04',
            bg: '#faf8f5',
            ink: '#292524',
            muted: '#78716c',
            border: '#e8e4de',
            card: '#f5f0e8',
          },
          fontFamily: {
            sans: ['"LINESeedTW"', 'system-ui', 'sans-serif'],
            mono: ['"FiraMono"', 'ui-monospace', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    body { background: #faf8f5; }
  </style>
</head>
<body class="min-h-screen" x-data="{ filter: 'all' }">

  <!-- Header -->
  <header class="border-b border-border">
    <div class="max-w-4xl mx-auto px-6 py-10">
      <div class="flex items-center gap-3 mb-3">
        <!-- Mic SVG icon -->
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ca8a04" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        <h1 class="text-3xl font-black text-ink tracking-tight">Sammy's Talks</h1>
      </div>
      <div class="w-10 h-0.5 bg-brand mb-4"></div>
      <p class="text-muted text-sm">
        Public slides &amp; reports from my talks. Built with care, powered by lobsters.
      </p>
    </div>
  </header>

  <!-- Talks list -->
  <main class="max-w-4xl mx-auto px-6 py-10">

    <!-- 2026-03-19 -->
    <article class="group mb-8">
      <a href="talks/2026-03-19-openclaw-lobster-diary/" class="block card">
        <div class="flex items-start justify-between gap-4">
          <div class="flex-1">
            <div class="flex items-center gap-2 mb-3">
              <span class="tag">Live Talk</span>
              <span class="text-xs text-muted font-mono">2026-03-19</span>
            </div>
            <h2 class="text-xl font-bold text-ink group-hover:text-brand transition-colors mb-2">
              龍蝦養成日記
            </h2>
            <p class="text-sm text-muted leading-relaxed">
              OpenClaw 實戰分享 — 從零開始的 AI 龍蝦養成之路。
            </p>
          </div>
          <!-- Arrow -->
          <div class="flex-shrink-0 pt-6 text-muted group-hover:text-brand transition-colors">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/>
              <polyline points="12 5 19 12 12 19"/>
            </svg>
          </div>
        </div>
      </a>
    </article>

  </main>

  <!-- Footer -->
  <footer class="border-t border-border">
    <div class="max-w-4xl mx-auto px-6 py-6 flex items-center justify-between text-xs text-muted">
      <span>Sammy Lin</span>
      <span class="flex items-center gap-1">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
        </svg>
        <a href="https://github.com/SammyLin/slides.3mi.tw" class="hover:text-brand">Source</a>
      </span>
    </div>
  </footer>

</body>
</html>
